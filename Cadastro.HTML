<!DOCTYPE html>
<html lang="pt-br">

<div class="banner">
    <div class="banner-overlay">
        <h1>DevTech</h1>
        <p>IA e Desenvolvimento Mobile</p>
    </div>
</div>

<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<nav>
    <a href="index.html">Início</a>
    <a href="Cadastro.HTML">Cadastro</a>
    <a href="Eventos.HTML">Eventos</a>
</nav>

<header>
    <h1>Inscrição para o Evento</h1>

    <div class="info">
        <span>📅 23/07/2026</span>
        <span>📍 Londrina/PR</span>
    </div>
</header>

<div class="container">

<form>

    <p>Preencha o formulário abaixo para garantir sua participação no evento DevTech:</p>

    <label>Nome completo:</label>
    <input type="text" required>

    <label>Email:</label>
    <input type="email" required>

    <label>Telefone:</label>
    <input type="tel">

    <label>Data de nascimento:</label>
    <input type="date">

    <label>Área de atuação:</label>
    <select>
        <option>Estudante</option>
        <option>Desenvolvedor</option>
        <option>Outro</option>
    </select>

    <label>Qual atividade você tem mais interesse?</label>
    <label><input type="radio" name="atividade"> Palestras sobre IA</label>
    <label><input type="radio" name="atividade"> Workshop Mobile</label>
    <label><input type="radio" name="atividade"> Ambos</label>

    <label>Como ficou sabendo do evento?</label>
    <label><input type="radio" name="origem"> Instagram</label>
    <label><input type="radio" name="origem"> Faculdade / Escola</label>
    <label><input type="radio" name="origem"> Amigos</label>
    <label><input type="radio" name="origem"> Internet</label>

    <label>Observações ou expectativas:</label>
    <textarea rows="4"></textarea>

    <button type="submit">Confirmar Inscrição</button>

</form>

</div>

<div id="contador-footer"></div>

<footer>
    © 2026 DevTech
</footer>

<script src="assets/js/script.js"></script>
</body>
</html>
