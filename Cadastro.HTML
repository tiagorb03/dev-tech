<header>
    <h1>Inscrição para o Evento</h1>

    <div class="info">
        <span>📅 23/07/2026</span>
        <span>📍 Londrina/PR</span>
    </div>
</header>

<div class="container">

<form>

    <label>Nome completo:</label>
    <input type="text" required>

    <label>Email:</label>
    <input type="email" required>

    <label>Telefone:</label>
    <input type="tel">

    <label>Data de nascimento:</label>
    <input type="date">

    <label>Área de atuação:</label>
    <select>
        <option>Estudante</option>
        <option>Desenvolvedor</option>
        <option>Outro</option>
    </select>

    <label>Qual atividade você tem mais interesse?</label>
    <label><input type="radio" name="atividade"> Palestras</label>
    <label><input type="radio" name="atividade"> Workshop</label>

    <label>Observações:</label>
    <textarea></textarea>

    <button type="submit">Confirmar Inscrição</button>

</form>

</div>

</footer>
