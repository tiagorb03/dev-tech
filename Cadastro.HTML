<!DOCTYPE html>
<html lang="pt-br">

<div class="banner">
    <div class="banner-overlay">
        <h1>DevTech</h1>
        <p>IA e Desenvolvimento Mobile</p>
    </div>
</div>

<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" type="image/png" href="assets/img/logo.png">
    <link rel="icon" href="assets/img/logo.png">
    <link rel="shortcut icon" href="assets/img/logo.png">
</head>
<body>

<nav>
    <a href="index.html">Início</a>
    <a href="Cadastro.HTML">Cadastro</a>
    <a href="Eventos.HTML">Eventos</a>
</nav>

<header>
    <h1>Inscrição para o Evento</h1>

    <div class="info">
        <span>📅 23/07/2026</span>
        <span>📍 Londrina/PR</span>
    </div>

    <div id="contador"></div>
</header>

<div class="container">

<form>

<p>
Preencha o formulário abaixo para participação no evento DevTech. 
Todas as informações serão utilizadas apenas para fins de organização.
</p>

<div class="form-group">
    <label>Nome completo:</label>
    <input type="text" required>
</div>

<div class="form-group">
    <label>Email:</label>
    <input type="email" required>
</div>

<div class="form-group">
    <label>Telefone:</label>
    <input type="tel">
</div>

<div class="form-group">
    <label>Data de nascimento:</label>
    <input type="date">
</div>

<div class="form-group">
    <label>Área de atuação:</label>
    <select>
        <option>Estudante</option>
        <option>Desenvolvedor</option>
        <option>Outro</option>
    </select>
</div>

<div class="form-group">
    <label>Qual atividade você tem mais interesse?</label>
    <div class="radio-group">
        <label><input type="radio" name="atividade"> Palestras sobre IA</label>
        <label><input type="radio" name="atividade"> Workshop Mobile</label>
        <label><input type="radio" name="atividade"> Ambos</label>
    </div>
</div>

<div class="form-group">
    <label>Como ficou sabendo do evento?</label>
    <div class="radio-group">
        <label><input type="radio" name="origem"> Instagram</label>
        <label><input type="radio" name="origem"> Faculdade / Escola</label>
        <label><input type="radio" name="origem"> Amigos</label>
        <label><input type="radio" name="origem"> Internet</label>
    </div>
</div>

<div class="form-group">
    <label>Observações:</label>
    <textarea rows="4"></textarea>
</div>

<button type="submit">Enviar</button>

</form>

</div>



<footer>
    © 2026 DevTech
</footer>

<script src="assets/js/script.js"></script>
</body>
</html>
